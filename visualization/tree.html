<head>
<meta charset="UTF-8">
<title>Germanic "Father" Tree</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  body {
    font-family: sans-serif;
    background: #fafafa;
  }
  .node circle {
    fill: #69b3a2;
    stroke: #333;
    stroke-width: 1.5px;
  }
  .node text {
    font-size: 12px;
  }
  .link {
    fill: none;
    stroke: #ccc;
    stroke-width: 1.5px;
  }
</style>
</head>
<body>
<h2>Germanic “Father” Language Evolution Tree</h2>
<svg viewBox="0 0 3000 800" preserveAspectRatio="xMidYMid" style="width: 100%; height:auto;"></svg>

<script>
const svg = d3.select("svg")
  .append("g")
  .attr("transform", "translate(0,20)");

d3.json("tree_germanic.json").then(function(data) {
  const root = d3.hierarchy(data);
  const treeLayout = d3.tree().size([window.innerWidth, window.innerHeight]);
  treeLayout(root);

  // links (vertical)
  svg.selectAll(".link")
    .data(root.links())
    .join("path")
    .attr("class", "link")
    .attr("d", d3.linkVertical()
      .x(d => d.x)
      .y(d => d.y)
    );

  // nodes
  const node = svg.selectAll(".node")
    .data(root.descendants())
    .join("g")
    .attr("class", "node")
    .attr("transform", d => `translate(${d.x},${d.y})`);

  node.append("circle").attr("r", 6);

  node.append("text")
    .attr("dy", -10)
    .style("text-anchor", "middle")
    .text(d => d.data.name + (d.data.forms ? " (" + d.data.forms.join(", ") + ")" : ""));
});
</script>
</body>
</html>
