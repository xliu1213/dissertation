<head>
<meta charset="UTF-8">
<script src="https://d3js.org/d3.v7.min.js"></script>
<link rel="stylesheet" href="tree.css">
</head>

<body>
<button id="btnGermanic">Germanic</button>
<button id="btnIndoStatic">Indo-European Overview</button>
<button id="btnIndoExpand">Indo-European Explore</button>
<h2 id="title"></h2>
<svg></svg>
<script>
const svgEl = d3.select("svg");
const MODES = {
  germanic: {
    file: "../backend/output/converter_germanic.json",
    title: "Germanic Language Evolution Tree",
    expandable: false
  },
  indoStatic: {
    file: "../backend/output/converter_indo.json",
    title: "Indo-European Language Evolution Tree (Overview)",
    expandable: false
  },
  indoExpand: {
    file: "../backend/output/converter_indo.json",
    title: "Indo-European Language Evolution Tree (Explore)",
    expandable: true
  }
};
let currentMode = "germanic";
function setBodyModeClass(modeKey) {
  document.body.classList.remove("germanic", "indoStatic", "indoExpand");
  document.body.classList.add(modeKey);
}
function drawTree() {
  svgEl.selectAll("*").remove(); // clear previous render
  const mode = MODES[currentMode];
  setBodyModeClass(currentMode);
  const isExplore = (currentMode === "indoExpand");
  const g = svgEl.append("g").attr(
    "transform",
    isExplore
      ? "translate(150,80)"   // add left margin for horizontal mode
      : "translate(0,60)"
  );
  
  const legend = svgEl.append("g").attr("transform", "translate(0,0)");
  const legendData = [
    { label: "BCE / Ancient", color: "#e53e3e" },
    { label: "0–600", color: "#dd6b20" },
    { label: "600–1100", color: "#38a169" },
    { label: "1100–1500", color: "#3182ce" },
    { label: "1500–1800", color: "#805ad5" },
    { label: "1800+", color: "#d53f8c" }
  ];
  const rowHeight = 30;      // spacing between rows
  const boxSize = 20;        // size of colour square
  const textOffset = 30;     // distance between box and text
  legend.selectAll("rect")
    .data(legendData)
    .enter()
    .append("rect")
    .attr("x", 0)
    .attr("y", (d, i) => i * rowHeight)
    .attr("width", boxSize)
    .attr("height", boxSize)
    .attr("fill", d => d.color)
  legend.selectAll("text")
    .data(legendData)
    .enter()
    .append("text")
    .attr("x", textOffset)
    .attr("y", (d, i) => i * rowHeight + 16)
    .style("font-size", "20px")
    .text(d => d.label);
  const width = svgEl.node().clientWidth;
  const height = svgEl.node().clientHeight;
  document.getElementById("title").textContent = mode.title;
  d3.json(mode.file).then(function(data) { 
    if (!data || Object.keys(data).length === 0) { // If backend returned empty object, render nothing
      svgEl.selectAll("*").remove();
      document.getElementById("title").textContent =
        "No Germanic data available";
      return;
    }
    const root = d3.hierarchy(data);
    if (mode.expandable) { // Collapse everything except root for expandable mode
      root.children.forEach(collapse);
    }

    const isExplore = (currentMode === "indoExpand");
    const treeLayout = d3.tree().size( // For horizontal: x = vertical space, y = horizontal space
      isExplore ? [height - 80, width * 0.8] : [width, height - 100]  // subtract left + right margin
    ).separation((a, b) => a.parent === b.parent ? 4 : 6); 
    update(root); 
    function update(source) { 
      g.selectAll("*").remove(); 
      treeLayout(root);
      g.selectAll(".link") // links
        .data(root.links())
        .join("path")
        .attr("class", "link")
        .attr("d", isExplore ? d3.linkHorizontal().x(d => d.y).y(d => d.x) : d3.linkVertical().x(d => d.x).y(d => d.y));
      const node = g.selectAll(".node") // nodes
        .data(root.descendants())
        .join("g")
        .attr("class", "node")
        .attr("transform", d => isExplore ? `translate(${d.y},${d.x})` : `translate(${d.x},${d.y})`)
        .on("click", (event, d) => { 
          if (!mode.expandable) return;
          toggle(d);
          update(d);
        });
      node.append("circle").attr("r", 10)
        .attr("fill", d => {
          const start = d.data.start;
          if (start === undefined) return "#ccc";
          if (start < 0) return "#e53e3e";        // Red (BCE / Ancient)
          if (start < 600) return "#dd6b20";      // Orange
          if (start < 1100) return "#38a169";     // Green
          if (start < 1500) return "#3182ce";     // Blue
          if (start < 1800) return "#805ad5";     // Purple
          return "#d53f8c";                       // Pink (Modern)
        });
      node.append("text").each(function(d) {
        const text = d3.select(this);
        const arrow = mode.expandable && (d.children || d._children) ? (d.children ? "▼ " : "▶ ") : "";
        if (isExplore) {
          text.attr("x", 0).attr("y", -13).style("text-anchor", "middle");
          let line = arrow + d.data.name;
          if (d.data.forms) {
            line += " — " + d.data.forms.join(", ");
          }
          if (d.data.start !== undefined && d.data.end !== undefined) {
            function formatYear(y) {
              return y < 0 ? Math.abs(y) + " BCE" : y;
            }
            line += " (" + formatYear(d.data.start) + "–" + formatYear(d.data.end) + ")";
          }
          text.text(line);
        } else {
          text.attr("transform", "translate(0,-45)").style("text-anchor", "middle");
          text.append("tspan").style("font-weight", "bold").text(arrow + d.data.name); // LANGUAGE  
          if (d.data.forms) { // FORMS
            text.append("tspan").attr("x", isExplore ? 18 : 0).attr("dy", 16).text(d.data.forms.join(", "));
          }
          if (d.data.start !== undefined && d.data.end !== undefined) { // DATES
            function formatYear(y) {
              return y < 0 ? Math.abs(y) + " BCE" : y;
            }
            const dateLine = "(" + formatYear(d.data.start) + "–" + formatYear(d.data.end) + ")";
            text.append("tspan")
              .attr("x", isExplore ? 18 : 0)
              .attr("dy", 15)
              .style("font-size", "0.9em")
              .style("fill", "#555")
              .text(dateLine);
          }
        }
      });
    }
    function collapse(d) {
      if (d.children) {
        d._children = d.children;
        d._children.forEach(collapse);
        d.children = null;
      }
    }
    function toggle(d) { 
      if (d.children) {
        d._children = d.children;
        d.children = null;
      } else if (d._children) {
        d.children = d._children;
        d._children = null;
      }
    }
  });
}

document.getElementById("btnGermanic").onclick = () => { // Button wiring
  currentMode = "germanic";
  drawTree();
};
document.getElementById("btnIndoStatic").onclick = () => {
  currentMode = "indoStatic";
  drawTree();
};
document.getElementById("btnIndoExpand").onclick = () => {
  currentMode = "indoExpand";
  drawTree();
};
drawTree();
window.addEventListener("resize", drawTree);
</script>
</body>
