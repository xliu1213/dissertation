<head>
<meta charset="UTF-8">
<title>Germanic "Father" Tree</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<link rel="stylesheet" href="tree.css">
</head>
<body>
<button id="btnGermanic">Germanic</button>
<button id="btnIndoStatic">Indo-European Overview</button>
<button id="btnIndoExpand">Indo-European Explore</button>
<h2 id="title"></h2>
<svg></svg>
<script>
const svgEl = d3.select("svg");
const MODES = {
  germanic: {
    file: "../backend/output/converter_output_father_germanic.json",
    title: 'Germanic "Father" Language Evolution Tree',
    expandable: false
  },
  indoStatic: {
    file: "../backend/output/converter_output_father_indo.json",
    title: 'Indo-European "Father" Language Evolution Tree (Overview)',
    expandable: false
  },
  indoExpand: {
    file: "../backend/output/converter_output_father_indo.json",
    title: 'Indo-European "Father" Language Evolution Tree (Explore)',
    expandable: true
  }
};

let currentMode = "germanic";

function setBodyModeClass(modeKey) {
  document.body.classList.remove("germanic", "indoStatic", "indoExpand");
  document.body.classList.add(modeKey);
}

function drawTree() {
  svgEl.selectAll("*").remove(); // clear previous render
  const mode = MODES[currentMode];
  setBodyModeClass(currentMode);
  const isExplore = (currentMode === "indoExpand");
  const g = svgEl.append("g").attr(
    "transform",
    isExplore
      ? "translate(60,60)"   // add left margin for horizontal mode
      : "translate(0,50)"
  );
  // ---- Legend ----
  const legend = svgEl.append("g")
    .attr("transform", "translate(20,20)");

  const legendData = [
    { label: "BCE / Ancient", color: "#2b6cb0" },
    { label: "0–600", color: "#6b46c1" },
    { label: "600–1100", color: "#2c7a7b" },
    { label: "1100–1500", color: "#d69e2e" },
    { label: "1500–1800", color: "#38a169" },
    { label: "1800+", color: "#22543d" }
  ];

  legend.selectAll("rect")
    .data(legendData)
    .enter()
    .append("rect")
    .attr("x", 0)
    .attr("y", (d, i) => i * 18)
    .attr("width", 12)
    .attr("height", 12)
    .attr("fill", d => d.color);

  legend.selectAll("text")
    .data(legendData)
    .enter()
    .append("text")
    .attr("x", 18)
    .attr("y", (d, i) => i * 18 + 10)
    .style("font-size", "11px")
    .text(d => d.label);
  const width = svgEl.node().clientWidth;
  const height = svgEl.node().clientHeight;
  document.getElementById("title").textContent = mode.title;
  d3.json(mode.file).then(function(data) { 
    // If backend returned empty object, render nothing
    if (!data || Object.keys(data).length === 0) {
      svgEl.selectAll("*").remove();
      document.getElementById("title").textContent =
        "No Germanic data available";
      return;
    }
    const root = d3.hierarchy(data);
    if (mode.expandable) { // Collapse everything except root for expandable mode
      root.children.forEach(collapse);
    }

  const isExplore = (currentMode === "indoExpand");

  const treeLayout = d3.tree()
    // For horizontal: x = vertical space, y = horizontal space
    .size(
      isExplore
        ? [height - 200, width - 150]  // subtract left + right margin
        : [width, height - 100]
    )
    .separation((a, b) => a.parent === b.parent ? 4 : 6);

    update(root); 
    function update(source) { 
      g.selectAll("*").remove(); 
      treeLayout(root);
      g.selectAll(".link") // links
        .data(root.links())
        .join("path")
        .attr("class", "link")
        .attr("d",
          isExplore
            ? d3.linkHorizontal()
                .x(d => d.y)
                .y(d => d.x)
            : d3.linkVertical()
                .x(d => d.x)
                .y(d => d.y)
        );

      const node = g.selectAll(".node") // nodes
        .data(root.descendants())
        .join("g")
        .attr("class", "node")
        .attr("transform", d =>
          isExplore
            ? `translate(${d.y},${d.x})`
            : `translate(${d.x},${d.y})`
        )
        .on("click", (event, d) => { 
          if (!mode.expandable) return;
          toggle(d);
          update(d);
        });
      node.append("circle")
        .attr("r", 6)
        .attr("fill", d => {
          const start = d.data.start;

          if (start === undefined) return "#ccc";

          if (start < 0) return "#2b6cb0";        // Ancient / BCE (blue)
          if (start < 600) return "#6b46c1";      // Late Antique (purple)
          if (start < 1100) return "#2c7a7b";     // Early Medieval (teal)
          if (start < 1500) return "#d69e2e";     // Late Medieval (gold)
          if (start < 1800) return "#38a169";     // Early Modern (green)
          return "#22543d";                       // Modern (dark green)
        });
      node.append("text")
        .style("text-anchor", "middle")
        .attr(
          "transform",
          isExplore
            ? "translate(0,-10)"   // horizontal Explore view
            : "translate(0,-22)"   // vertical Germanic + Overview
        )
        .each(function(d) {
          const text = d3.select(this);
          const arrow =
            mode.expandable && (d.children || d._children)
              ? (d.children ? "▼ " : "▶ ")
              : "";
      const nameLine = arrow + d.data.name;

      text.append("tspan")
        .attr("x", 0)
        .attr("dy", 0)
        .text(nameLine);

      // ---- NEW: Date Range Line ----
      if (d.data.start !== undefined && d.data.end !== undefined) {

        function formatYear(y) {
          return y < 0 ? Math.abs(y) + " BCE" : y;
        }

        const dateLine = "(" + formatYear(d.data.start) + "–" + formatYear(d.data.end) + ")";

        text.append("tspan")
          .attr("x", 0)
          .attr("dy", 14)
          .style("font-size", "0.8em")
          .style("fill", "#777")
          .text(dateLine);
      }
          if (!isExplore && d.data.forms) { // Second line: word forms (ONLY for non-explore modes)
            text.append("tspan")
              .attr("x", 0)
              .attr("dy", 28)   // vertical spacing between lines
              .style("font-size", "0.9em")
              .style("fill", "#555")
              .text("(" + d.data.forms.join(", ") + ")");
          }
          if (isExplore && d.data.forms) { // For explore mode, keep everything inline
            text.append("tspan")
              .attr("dx", 4)
              .text(" (" + d.data.forms.join(", ") + ")");
          }
        });
    }

    function collapse(d) {
      if (d.children) {
        d._children = d.children;
        d._children.forEach(collapse);
        d.children = null;
      }
    }

    function toggle(d) { 
      if (d.children) {
        d._children = d.children;
        d.children = null;
      } else if (d._children) {
        d.children = d._children;
        d._children = null;
      }
    }
  });
}

document.getElementById("btnGermanic").onclick = () => { // Button wiring
  currentMode = "germanic";
  drawTree();
};
document.getElementById("btnIndoStatic").onclick = () => {
  currentMode = "indoStatic";
  drawTree();
};
document.getElementById("btnIndoExpand").onclick = () => {
  currentMode = "indoExpand";
  drawTree();
};
drawTree();
window.addEventListener("resize", drawTree);
</script>
</body>
</html>
