<head>
<meta charset="UTF-8">
<title>Germanic "Father" Tree</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<link rel="stylesheet" href="tree.css">
</head>
<body>
<h2>Germanic "Father" Language Evolution Tree</h2>
<svg></svg>
<script>
const svgEl = d3.select("svg");
const g = svgEl.append("g").attr("transform", "translate(0,50)");

function drawTree() {
  svgEl.selectAll("*").remove(); // clear previous render
  const g = svgEl.append("g").attr("transform", "translate(0,50)");

  const width = svgEl.node().clientWidth;
  const height = svgEl.node().clientHeight;

  d3.json("tree_germanic.json").then(function(data) {
    const root = d3.hierarchy(data);
    const treeLayout = d3.tree().size([width, height - 100]).separation((a, b) => a.parent === b.parent ? 3 : 4);

    treeLayout(root);

    // links
    g.selectAll(".link")
      .data(root.links())
      .join("path")
      .attr("class", "link")
      .attr("d", d3.linkVertical()
        .x(d => d.x)
        .y(d => d.y)
      );

    // nodes
    const node = g.selectAll(".node")
      .data(root.descendants())
      .join("g")
      .attr("class", "node")
      .attr("transform", d => `translate(${d.x},${d.y})`);

    node.append("circle").attr("r", 6);

    // text wrapping
    const maxLineWidth = 120;
    // create a label group shifted upward above circle
    const labelGroup = node.append("g")
      .attr("transform", "translate(0, -25)");
    labelGroup.append("text")
      .style("text-anchor", "middle")
      .each(function(d) {
        const fullText =
          d.data.name +
          (d.data.forms ? " (" + d.data.forms.join(", ") + ")" : "");

        const words = fullText.split(" ");
        const lineHeight = 14;
        let line = [];
        let lineNumber = 0;

        const textEl = d3.select(this);

        textEl.text(null); // clear text before adding tspan children

        words.forEach(word => {
          line.push(word);
          const testLine = line.join(" ");
          
          // temporary measure width using a tspan
          const tspan = textEl.append("tspan").text(testLine);
          const width = tspan.node().getComputedTextLength();
          tspan.remove();

          if (width > maxLineWidth) {
            line.pop(); // start a new line

            textEl.append("tspan")
              .attr("x", 0)
              .attr("dy", lineNumber === 0 ? "0" : lineHeight)
              .text(line.join(" "));

            line = [word];
            lineNumber++;
          }
        });

        // final line
        textEl.append("tspan")
          .attr("x", 0)
          .attr("dy", lineNumber === 0 ? "0" : lineHeight)
          .text(line.join(" "));
      });
  });
}

// draw once on load
drawTree();

// redraw on window resize
window.addEventListener("resize", drawTree);
</script>
</body>
</html>
