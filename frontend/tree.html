<head>
<meta charset="UTF-8">
<title>Germanic "Father" Tree</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<link rel="stylesheet" href="tree.css">
</head>
<body>
<button id="toggleTree">Switch to Indo-European Tree</button>
<h2 id="title">Germanic "Father" Language Evolution Tree</h2>
<svg></svg>
<script>
const svgEl = d3.select("svg");
let currentTree = "germanic"; // Track which tree is currently shown
const DATASETS = {
  germanic: {
    file: "../backend/output/converter_output_father_germanic.json",
    title: 'Germanic "Father" Language Evolution Tree'
  },
  indo: {
    file: "../backend/output/converter_output_father_indo.json",
    title: 'Indo-European "Father" Language Evolution Tree'
  }
};

function drawTree() {
  svgEl.selectAll("*").remove(); // clear previous render
  const g = svgEl.append("g").attr("transform", "translate(0,50)");
  const width = svgEl.node().clientWidth;
  const height = svgEl.node().clientHeight;

  const dataset = DATASETS[currentTree];
  document.getElementById("title").textContent = dataset.title; // update title
  d3.json(dataset.file).then(function(data) {
    const root = d3.hierarchy(data);
    const treeLayout = d3.tree().size([width, height - 100]).separation((a, b) => a.parent === b.parent ? 3 : 4);
    treeLayout(root);
    g.selectAll(".link") // links
      .data(root.links())
      .join("path")
      .attr("class", "link")
      .attr("d", d3.linkVertical()
        .x(d => d.x)
        .y(d => d.y)
      );
    const node = g.selectAll(".node") // nodes
      .data(root.descendants())
      .join("g")
      .attr("class", "node")
      .attr("transform", d => `translate(${d.x},${d.y})`);
    node.append("circle").attr("r", 6);
    const maxLineWidth = 120; // text wrapping
    const labelGroup = node.append("g") // create a label group shifted upward above circle
      .attr("transform", "translate(0, -25)");
    labelGroup.append("text")
      .style("text-anchor", "middle")
      .each(function(d) {
        const fullText =
          d.data.name +
          (d.data.forms ? " (" + d.data.forms.join(", ") + ")" : "");
        const words = fullText.split(" ");
        const lineHeight = 14;
        let line = [];
        let lineNumber = 0;
        const textEl = d3.select(this);
        textEl.text(null); // clear text before adding tspan children
        words.forEach(word => {
          line.push(word);
          const testLine = line.join(" ");
          const tspan = textEl.append("tspan").text(testLine); // temporary measure width using a tspan
          const width = tspan.node().getComputedTextLength();
          tspan.remove();
          if (width > maxLineWidth) { // start a new line
            line.pop(); 
            textEl.append("tspan")
              .attr("x", 0)
              .attr("dy", lineNumber === 0 ? "0" : lineHeight)
              .text(line.join(" "));
            line = [word];
            lineNumber++;
          }
        });
        textEl.append("tspan") // final line
          .attr("x", 0)
          .attr("dy", lineNumber === 0 ? "0" : lineHeight)
          .text(line.join(" "));
      });
  });
}

drawTree(currentTree); // initial render
document.getElementById("toggleTree").addEventListener("click", () => { // toggle button logic
  currentTree = currentTree === "germanic" ? "indo" : "germanic";
  document.getElementById("toggleTree").textContent =
    currentTree === "germanic"
      ? "Switch to Indo-European Tree"
      : "Switch to Germanic Tree";
  drawTree(currentTree);
});
window.addEventListener("resize", () => drawTree(currentTree)); // redraw on resize
</script>
</body>
</html>
